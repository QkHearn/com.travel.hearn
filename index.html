<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hearn & 瑾怡 | 旅行足迹</title>
  <meta name="description" content="Hearn 和 瑾怡的旅行足迹，记录我们走过的每一个角落">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <!-- 星空背景 Canvas -->
  <canvas id="starry-canvas"></canvas>
  
  <!-- SVG 滤镜定义 -->
  <svg class="oil-paint-filter" aria-hidden="true">
    <defs>
      <filter id="oilPaint">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="0.5"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="1.1"/>
        </feComponentTransfer>
      </filter>
    </defs>
  </svg>

  <!-- 导航栏 -->
  <nav class="main-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Hearn <span>&</span> 瑾怡</a>
      <button class="nav-toggle" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links">
        <a href="index.html" class="active">首页</a>
        <a href="map.html">地图</a>
        <a href="gallery.html">相册</a>
        <a href="stories.html">故事</a>
        <a href="about.html">关于</a>
      </div>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main class="page-content">
    <!-- Hero 区域 -->
    <section class="hero">
      <div class="hero-content">
        <p class="hero-label" data-reveal>TRAVEL JOURNAL</p>
        <h1 class="hero-title" data-reveal>
          <span class="hero-name">Hearn</span>
          <span class="hero-ampersand">&</span>
          <span class="hero-name">瑾怡</span>
        </h1>
        <p class="hero-subtitle" data-reveal>我们的旅行足迹 · 记录走过的每一个角落</p>
        <div class="hero-actions" data-reveal>
          <a href="map.html" class="btn btn-primary">探索地图</a>
          <a href="stories.html" class="btn btn-outline">阅读故事</a>
        </div>
      </div>
      <div class="hero-scroll">
        <span>向下滚动</span>
        <div class="scroll-indicator">
          <div class="scroll-dot"></div>
        </div>
      </div>
    </section>

    <!-- 统计区域 -->
    <section class="stats-section">
      <div class="container">
        <div class="stats-grid">
          <div class="stat-card" data-reveal>
            <div class="stat-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="stat-number" data-target="0" data-stat="countries">0</div>
            <div class="stat-label">国家</div>
          </div>
          <div class="stat-card" data-reveal>
            <div class="stat-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><path d="M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
            </div>
            <div class="stat-number" data-target="0" data-stat="cities">0</div>
            <div class="stat-label">城市</div>
          </div>
          <div class="stat-card" data-reveal>
            <div class="stat-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
            </div>
            <div class="stat-number" data-target="0" data-stat="days">0</div>
            <div class="stat-label">旅行天数</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 最新旅程 -->
    <section class="latest-section">
      <div class="container">
        <h2 class="section-title" data-reveal>最新<span>旅程</span></h2>
        <p class="section-subtitle" data-reveal>探索我们最近到达的目的地</p>
        <div class="latest-grid" id="latest-destinations"></div>
        <div class="section-cta" data-reveal>
          <a href="map.html" class="btn btn-outline">查看全部目的地</a>
        </div>
      </div>
    </section>

    <!-- 精选照片 -->
    <section class="featured-section">
      <div class="container">
        <h2 class="section-title" data-reveal>精选<span>瞬间</span></h2>
        <p class="section-subtitle" data-reveal>每一张照片都是一段难忘的回忆</p>
        <div class="featured-grid" id="featured-photos"></div>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="main-footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">Hearn & 瑾怡</div>
        <p class="footer-text">用脚步丈量世界，用镜头记录美好</p>
        <div class="footer-links">
          <a href="map.html">地图</a>
          <a href="gallery.html">相册</a>
          <a href="stories.html">故事</a>
          <a href="about.html">关于</a>
        </div>
        <p class="footer-text" style="margin-top: 1rem; font-size: 0.8rem;">
          © 2024 Hearn & 瑾怡 · 旅行足迹
        </p>
      </div>
    </div>
  </footer>

  <!-- 返回顶部 -->
  <button class="back-to-top" aria-label="返回顶部">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
  </button>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
